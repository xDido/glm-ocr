services:

  sglang:
    # Official lmsysorg/sglang image, used directly — no local build step.
    # Pull once via Docker Desktop (or `docker pull lmsysorg/sglang:latest`)
    # and compose just runs it.
    image: lmsysorg/sglang:${SGL_IMAGE_TAG:-latest}
    container_name: glmocr-sglang
    restart: unless-stopped
    ports:
      - "${SGL_PORT:-30000}:30000"
    # Bind-mounted entrypoint. `bash` explicitly so we don't rely on the exec
    # bit surviving a Windows/WSL2 bind-mount.
    entrypoint: ["bash", "/glm-ocr-entrypoint.sh"]
    environment:
      SGL_MODEL_PATH: ${SGL_MODEL_PATH}
      SGL_SERVED_MODEL_NAME: ${SGL_SERVED_MODEL_NAME}
      SGL_TP_SIZE: ${SGL_TP_SIZE}
      SGL_DTYPE: ${SGL_DTYPE}
      SGL_MAX_RUNNING_REQUESTS: ${SGL_MAX_RUNNING_REQUESTS}
      SGL_MAX_PREFILL_TOKENS: ${SGL_MAX_PREFILL_TOKENS}
      SGL_MAX_TOTAL_TOKENS: ${SGL_MAX_TOTAL_TOKENS}
      SGL_MEM_FRACTION_STATIC: ${SGL_MEM_FRACTION_STATIC}
      SGL_CONTEXT_LENGTH: ${SGL_CONTEXT_LENGTH:-}
      SGL_CHUNKED_PREFILL: ${SGL_CHUNKED_PREFILL}
      SGL_CHUNKED_PREFILL_SIZE: ${SGL_CHUNKED_PREFILL_SIZE:-8192}
      SGL_SCHEDULE_POLICY: ${SGL_SCHEDULE_POLICY}
      SGL_SPECULATIVE: ${SGL_SPECULATIVE:-}
      SGL_SPEC_ALGORITHM: ${SGL_SPEC_ALGORITHM:-}
      SGL_SPEC_NUM_STEPS: ${SGL_SPEC_NUM_STEPS:-}
      SGL_SPEC_EAGLE_TOPK: ${SGL_SPEC_EAGLE_TOPK:-}
      SGL_SPEC_NUM_DRAFT_TOKENS: ${SGL_SPEC_NUM_DRAFT_TOKENS:-}
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ./docker/gpu/entrypoint.sh:/glm-ocr-entrypoint.sh:ro
      # Bind-mount the model cache INSIDE the repo so weights land next to the
      # code and survive `docker compose down`. First boot downloads ~1.8 GB.
      - ./hf-cache:/root/.cache/huggingface
    shm_size: "32gb"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        # Mirror g4dn.2xlarge sizing (8 vCPU, 32 GB) so local numbers
        # are comparable to what the AWS target will see. Honored by
        # `docker compose up` in non-swarm mode.
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:30000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 600s
    networks: [glmocr]

  cpu:
    build:
      context: ./docker/cpu
      dockerfile: Dockerfile.slim
    image: glmocr-cpu:local
    container_name: glmocr-cpu
    restart: unless-stopped
    ports:
      - "${GLMOCR_PORT:-5002}:5002"
      - "${ASYNC_PORT:-5003}:5003"
    environment:
      CPU_WORKERS: ${CPU_WORKERS}
      CPU_THREADS: ${CPU_THREADS}
      # Torch/MKL math-thread caps. Critical on CPU layout inference:
      # without caps, 4 workers × default OMP=8 = 32 threads fighting
      # the 8-vCPU cgroup. Default to 2 when unset.
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT}
      GLMOCR_PORT: "5002"
      OCR_MAX_WORKERS: ${OCR_MAX_WORKERS}
      OCR_CONNECT_TIMEOUT: ${OCR_CONNECT_TIMEOUT}
      OCR_REQUEST_TIMEOUT: ${OCR_REQUEST_TIMEOUT}
      OCR_RETRY_MAX: ${OCR_RETRY_MAX}
      OCR_RETRY_BACKOFF_BASE: ${OCR_RETRY_BACKOFF_BASE}
      OCR_RETRY_BACKOFF_MAX: ${OCR_RETRY_BACKOFF_MAX}
      OCR_CONN_POOL: ${OCR_CONN_POOL}
      OCR_MODEL_NAME: ${OCR_MODEL_NAME}
      LAYOUT_ENABLED: ${LAYOUT_ENABLED}
      LAYOUT_DEVICE: ${LAYOUT_DEVICE}
      LAYOUT_USE_POLYGON: ${LAYOUT_USE_POLYGON}
      LAYOUT_MODEL_DIR: ${LAYOUT_MODEL_DIR:-PaddlePaddle/PP-DocLayoutV3_safetensors}
      LAYOUT_BACKEND: ${LAYOUT_BACKEND:-torch}
      LAYOUT_ONNX_THREADS: ${LAYOUT_ONNX_THREADS:-1}
      # Phase 1 — numpy post-processing (drop torch from request path).
      # torch = upstream default, safe fallback | numpy = no-torch hot path.
      LAYOUT_POSTPROC: ${LAYOUT_POSTPROC:-torch}
      # Phase 2 — fused ONNX graph (raw = default, fused = post-proc baked in).
      # Fused was rolled back (regressed at c=24/32); kept behind the flag.
      LAYOUT_GRAPH: ${LAYOUT_GRAPH:-raw}
      LAYOUT_COMPILE: ${LAYOUT_COMPILE:-false}
      LAYOUT_BATCH_ENABLED: ${LAYOUT_BATCH_ENABLED:-false}
      LAYOUT_BATCH_MAX: ${LAYOUT_BATCH_MAX:-4}
      LAYOUT_BATCH_WINDOW_MS: ${LAYOUT_BATCH_WINDOW_MS:-20}
      # Optional async FastAPI sidecar (LAYOUT_ASYNC=true starts uvicorn
      # on ASYNC_PORT alongside gunicorn). Rolled back — kept behind flag.
      LAYOUT_ASYNC: ${LAYOUT_ASYNC:-false}
      ASYNC_PORT: ${ASYNC_PORT:-5003}
      ASYNC_WORKERS: ${ASYNC_WORKERS:-4}
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      SGLANG_HOST: ${SGLANG_HOST}
      SGLANG_PORT: ${SGLANG_PORT}
      SGLANG_SCHEME: ${SGLANG_SCHEME}
      GLMOCR_PIPELINE_METRICS: "true"
      # Mirror SGL batching knobs into the CPU container so runtime_app can
      # expose them as glmocr_config_sgl_* gauges on the dashboard. These
      # are read-only here — the actual cap is enforced by SGLang itself.
      SGL_MAX_RUNNING_REQUESTS: ${SGL_MAX_RUNNING_REQUESTS}
      SGL_MAX_TOTAL_TOKENS: ${SGL_MAX_TOTAL_TOKENS}
      SGL_MAX_PREFILL_TOKENS: ${SGL_MAX_PREFILL_TOKENS}
      SGL_CHUNKED_PREFILL_SIZE: ${SGL_CHUNKED_PREFILL_SIZE:-8192}
    volumes:
      - ./scripts/smoke_test.png:/app/smoke_test.png:ro
      # Share the HF cache with the sglang container so the layout model
      # download persists across rebuilds (and doesn't get duplicated).
      - ./hf-cache:/root/.cache/huggingface
      # OmniDocBench (and other benchmarks) are addressable at
      # file:///app/datasets/... from inside the container, so the
      # load-test orchestrator can hand the drivers container-visible URLs.
      - ./datasets:/app/datasets:ro
    depends_on:
      sglang:
        condition: service_healthy
    deploy:
      resources:
        # 8 vCPU / 20 GB to mirror g4dn.2xlarge co-located sizing.
        # No GPU reservation — layout-on-CUDA was evaluated and rejected
        # on the 8 GB dev card because torch's CUDA context (~1 GB per
        # worker) steals VRAM from SGLang's KV cache. Keep layout on CPU
        # in this container; re-add a reservation only if LAYOUT_DEVICE
        # moves back to cuda on a 16 GB+ target.
        limits:
          cpus: "12"
          memory: 24G
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5002/health || curl -fsS -o /dev/null http://localhost:5002/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [glmocr]

  prometheus:
    # Scrapes SGLang's /metrics and the CPU container's /metrics every 5s.
    # Data is ephemeral — restart loses history. That's fine for a local
    # load-test harness; Grafana dashboards are the real output.
    image: prom/prometheus:latest
    container_name: glmocr-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
      - --web.enable-lifecycle
      # Accept k6's --out experimental-prometheus-rw during load runs.
      - --web.enable-remote-write-receiver
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - sglang
      - cpu
    networks: [glmocr]

  alloy:
    # Grafana Alloy — scrapes the same targets as the local Prometheus and
    # remote_writes to Grafana Cloud Mimir. Only starts shipping when the
    # three GRAFANA_CLOUD_PROM_* vars are set in .env. The local Prometheus
    # is the source of truth for local Grafana; Alloy handles cloud egress.
    image: grafana/alloy:latest
    container_name: glmocr-alloy
    restart: unless-stopped
    ports:
      # Alloy's built-in UI for inspecting scrape targets and remote_write
      # queue health. Handy for debugging "why aren't my metrics in Cloud".
      - "${ALLOY_PORT:-12345}:12345"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=generally-available
      - /etc/alloy/config.alloy
    environment:
      - GRAFANA_CLOUD_PROM_URL=${GRAFANA_CLOUD_PROM_URL:-}
      - GRAFANA_CLOUD_PROM_USER=${GRAFANA_CLOUD_PROM_USER:-}
      - GRAFANA_CLOUD_PROM_TOKEN=${GRAFANA_CLOUD_PROM_TOKEN:-}
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
    depends_on:
      - sglang
      - cpu
    networks: [glmocr]

  pushgateway:
    # Short-lived jobs (the asyncio bench script) push their final stats
    # here; Prometheus scrapes pushgateway on the usual cadence so the
    # summary appears on the dashboard without needing the bench process
    # to stay alive.
    image: prom/pushgateway:latest
    container_name: glmocr-pushgateway
    restart: unless-stopped
    ports:
      - "${PUSHGATEWAY_PORT:-9091}:9091"
    networks: [glmocr]

  locust-exporter:
    # Scrapes Locust's web API (which the orchestrator explicitly runs on
    # the host via --web-port 8089) and exposes /metrics for Prometheus.
    # host.docker.internal resolves to the Docker Desktop host.
    image: containersol/locust_exporter:latest
    container_name: glmocr-locust-exporter
    restart: unless-stopped
    environment:
      LOCUST_EXPORTER_URI: http://host.docker.internal:${LOCUST_WEB_PORT:-8089}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [glmocr]

  cadvisor:
    # Per-container CPU / memory / network / disk stats. Reads the docker
    # daemon via the mounted socket + cgroups.
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: glmocr-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "${CADVISOR_PORT:-8088}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [glmocr]

  nvidia-gpu-exporter:
    # NVIDIA's official DCGM exporter. Emits metrics as DCGM_FI_DEV_* —
    # GPU util, VRAM, temperature, power, SM clocks, etc. Robust against
    # newer driver versions that break simpler nvidia-smi wrappers.
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
    container_name: glmocr-gpu-exporter
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      - "${GPU_EXPORTER_PORT:-9835}:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]
    networks: [glmocr]

  grafana:
    # Provisioned datasource (Prometheus) + dashboard (GLM-OCR Load Test).
    # Annotations land in Grafana's built-in SQLite store so driver
    # start/end markers show as vertical lines on every panel.
    image: grafana/grafana:latest
    container_name: glmocr-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Consumed by provisioning/datasources/prometheus.yml for the second
      # (Grafana Cloud Mimir) datasource. Leave empty = datasource inert.
      GRAFANA_CLOUD_PROM_URL_READ: ${GRAFANA_CLOUD_PROM_URL_READ:-}
      GRAFANA_CLOUD_PROM_USER: ${GRAFANA_CLOUD_PROM_USER:-}
      GRAFANA_CLOUD_PROM_TOKEN: ${GRAFANA_CLOUD_PROM_TOKEN:-}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks: [glmocr]

networks:
  glmocr:
    driver: bridge

volumes:
  grafana-data:
